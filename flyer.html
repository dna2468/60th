<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>60周年記念式典 フライヤー</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
    <style>
        @page { size: A4 portrait; margin: 0; }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --gold: #B8943E;
            --gold-light: #D4B36A;
            --navy: #1B2D4B;
            --navy-light: #2A4068;
            --green: #2D5A47;
            --bg: #FAFAF7;
            --text: #2C2C2C;
            --text-light: #888;
            --font-sans: 'Noto Sans JP', sans-serif;
            --font-serif: 'Shippori Mincho', serif;
        }

        body {
            font-family: var(--font-sans);
            background: #aaa;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        @media print { body { background: none; padding: 0; } }

        .page {
            width: 210mm; height: 297mm;
            background: var(--bg);
            color: var(--text);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        @media print { .page { box-shadow: none; } }

        /* ===== Top hero band ===== */
        .hero {
            background: var(--navy);
            color: #fff;
            padding: 50px 40px 45px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background:
                radial-gradient(ellipse at 30% 40%, rgba(212,179,106,0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 60%, rgba(45,90,71,0.1) 0%, transparent 50%);
        }
        .hero > * { position: relative; z-index: 1; }

        .hero-org {
            font-size: 10pt;
            font-weight: 400;
            letter-spacing: 0.35em;
            color: rgba(255,255,255,0.55);
            margin-bottom: 18px;
        }

        .hero-badge {
            display: inline-flex;
            align-items: baseline;
            gap: 4px;
            margin-bottom: 6px;
        }
        .hero-number {
            font-family: var(--font-serif);
            font-size: 80pt;
            font-weight: 600;
            line-height: 1;
            color: var(--gold-light);
        }
        .hero-th {
            font-family: var(--font-serif);
            font-size: 28pt;
            font-weight: 600;
            color: var(--gold-light);
            vertical-align: super;
            line-height: 1;
        }
        .hero-anniversary {
            font-size: 11pt;
            font-weight: 700;
            letter-spacing: 0.5em;
            color: var(--gold-light);
            text-transform: uppercase;
        }

        .hero-line {
            width: 40px; height: 1.5px;
            background: var(--gold-light);
            margin: 22px auto;
            opacity: 0.5;
        }

        .hero-catch {
            font-family: var(--font-serif);
            font-size: 22pt;
            font-weight: 600;
            letter-spacing: 0.12em;
            line-height: 1.5;
        }

        /* ===== Main content area ===== */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 35px 40px 30px;
        }

        /* Event card */
        .event-card {
            width: 100%;
            max-width: 440px;
            border: 2px solid var(--navy);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 28px;
        }
        .event-card-header {
            background: var(--navy);
            color: #fff;
            text-align: center;
            padding: 10px 20px;
            font-size: 9pt;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }
        .event-card-body {
            padding: 25px 30px 22px;
            text-align: center;
        }
        .event-date {
            font-family: var(--font-serif);
            font-size: 20pt;
            font-weight: 600;
            color: var(--navy);
            letter-spacing: 0.08em;
            margin-bottom: 10px;
        }
        .event-venue {
            font-family: var(--font-serif);
            font-size: 12pt;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 3px;
        }
        .event-venue-icon {
            display: inline-block;
            width: 12px; height: 12px;
            vertical-align: -1px;
            margin-right: 3px;
            fill: var(--gold);
        }
        .event-address {
            font-size: 7.5pt;
            color: var(--text-light);
            margin-bottom: 18px;
        }
        .event-divider {
            width: 100%;
            height: 1px;
            background: #e5e5e0;
            margin-bottom: 16px;
        }
        .schedule {
            display: flex;
            justify-content: center;
            gap: 35px;
        }
        .schedule-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .schedule-time {
            font-family: var(--font-serif);
            font-size: 14pt;
            font-weight: 600;
            color: var(--navy);
        }
        .schedule-label {
            font-size: 9pt;
            color: var(--text-light);
            font-weight: 700;
        }
        .schedule-note {
            font-size: 7pt;
            color: var(--text-light);
            margin-top: 10px;
        }

        /* QR section */
        .qr-section {
            display: flex;
            align-items: center;
            gap: 22px;
            background: #fff;
            border: 1px solid #e5e5e0;
            border-radius: 10px;
            padding: 18px 28px;
            max-width: 400px;
            width: 100%;
            margin-bottom: 22px;
        }
        .qr-code {
            width: 80px; height: 80px;
            flex-shrink: 0;
            background: #fff;
            border-radius: 6px;
            padding: 4px;
            border: 1px solid #eee;
        }
        .qr-code img { width: 100%; height: 100%; }
        .qr-text { text-align: left; }
        .qr-label {
            font-size: 7.5pt;
            font-weight: 700;
            letter-spacing: 0.15em;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 3px;
        }
        .qr-url {
            font-size: 11pt;
            font-weight: 700;
            color: var(--navy);
            font-family: var(--font-sans);
        }
        .qr-desc {
            font-size: 7.5pt;
            color: var(--text-light);
            margin-top: 4px;
            line-height: 1.5;
        }

        /* Footer */
        .flyer-footer {
            font-size: 7.5pt;
            color: var(--text-light);
            letter-spacing: 0.08em;
            text-align: center;
        }

        /* Bottom accent bar */
        .bottom-bar {
            height: 6px;
            background: linear-gradient(90deg, var(--navy) 0%, var(--green) 40%, var(--gold) 100%);
        }

        /* Print button */
        .print-btn {
            position: fixed; top: 20px; right: 20px; z-index: 100;
            background: var(--navy); color: #fff; border: none;
            padding: 12px 24px; font-size: 14px; font-weight: 700;
            border-radius: 6px; cursor: pointer; font-family: var(--font-sans);
        }
        .print-btn:hover { background: var(--navy-light); }
        @media print { .print-btn { display: none; } }
    </style>
</head>
<body>
    <button class="print-btn" onclick="window.print()">PDF / 印刷</button>

    <div class="page">
        <!-- Hero -->
        <div class="hero">
            <p class="hero-org">名古屋青年税理士連盟</p>
            <div class="hero-badge">
                <span class="hero-number">60</span><span class="hero-th">th</span>
            </div>
            <div class="hero-anniversary">Anniversary</div>
            <div class="hero-line"></div>
            <h1 class="hero-catch">ここから、次の60年。</h1>
        </div>

        <!-- Main content -->
        <div class="main">
            <!-- Event card -->
            <div class="event-card">
                <div class="event-card-header">記念式典のご案内</div>
                <div class="event-card-body">
                    <p class="event-date">令和9年1月23日（土）</p>
                    <p class="event-venue">
                        <svg class="event-venue-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>ANAクラウンプラザホテルグランコート名古屋
                    </p>
                    <p class="event-address">〒460-0023 愛知県名古屋市中区金山町1-1-1</p>
                    <div class="event-divider"></div>
                    <div class="schedule">
                        <div class="schedule-item">
                            <span class="schedule-time">16:00〜</span>
                            <span class="schedule-label">記念式典</span>
                        </div>
                        <div class="schedule-item">
                            <span class="schedule-time">17:00〜</span>
                            <span class="schedule-label">懇親会</span>
                        </div>
                    </div>
                    <p class="schedule-note">※開始時間は予定です</p>
                </div>
            </div>

            <!-- QR -->
            <div class="qr-section">
                <div class="qr-code">
                    <img src="images/site-qr.svg" alt="特設サイト QRコード">
                </div>
                <div class="qr-text">
                    <p class="qr-label">60th Special Site</p>
                    <p class="qr-url">60th.rta.nagoya</p>
                    <p class="qr-desc">特設サイトでは記念事業の<br>最新情報をお届けします</p>
                </div>
            </div>
        </div>

        <!-- Bottom accent bar -->
        <div class="bottom-bar"></div>
    </div>
</body>
</html>
