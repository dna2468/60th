<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名古屋青年税理士連盟 創立60周年記念特設サイト</title>
    <meta name="description" content="名古屋青年税理士連盟は創立60周年を迎えます。記念式典は令和9年1月23日（土）ANAクラウンプラザホテルグランコート名古屋にて開催。">
    <meta property="og:title" content="名古屋青年税理士連盟 創立60周年記念特設サイト">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.meiseizei.gr.jp/60th/">
    <meta property="og:image" content="https://www.meiseizei.gr.jp/60th/images/og-image.jpg">
    <meta property="og:description" content="信頼の60年、未来へ。名古屋青年税理士連盟創立60周年記念特設サイトです。">
    <meta property="og:site_name" content="名古屋青年税理士連盟">
    <meta property="og:locale" content="ja_JP">
    <link rel="icon" href="images/favicon.ico">
    <link rel="apple-touch-icon" href="images/og-image.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --gold: #C5A059;
            --gold-light: #d4b36a;
            --dark: #0a0a0a;
            --dark-card: rgba(255,255,255,0.04);
            --font-sans: 'Noto Sans JP', sans-serif;
            --font-serif: 'Shippori Mincho', serif;
        }

        body {
            font-family: var(--font-sans);
            background: var(--dark);
            color: #fff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Background */
        .bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(197,160,89,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(197,160,89,0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(197,160,89,0.04) 0%, transparent 50%);
        }

        .bg-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        /* Floating particles */
        .particles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
            overflow: hidden; pointer-events: none;
        }
        .particle {
            position: absolute;
            width: 3px; height: 3px;
            background: var(--gold);
            border-radius: 50%;
            opacity: 0;
            animation: float-up linear infinite;
        }

        @keyframes float-up {
            0% { opacity: 0; transform: translateY(100vh) scale(0); }
            10% { opacity: 0.6; }
            90% { opacity: 0.3; }
            100% { opacity: 0; transform: translateY(-10vh) scale(1); }
        }

        /* Main content */
        .container {
            position: relative; z-index: 10;
            text-align: center;
            padding: 20px;
            max-width: 800px;
        }

        /* Organization name */
        .org-name {
            font-family: var(--font-serif);
            font-size: clamp(0.85rem, 2vw, 1.1rem);
            font-weight: 400;
            letter-spacing: 0.3em;
            color: rgba(255,255,255,0.5);
            margin-bottom: 30px;
            opacity: 0;
            animation: fade-in 1s 0.5s forwards;
        }

        /* Anniversary badge */
        .anniversary {
            margin-bottom: 20px;
            opacity: 0;
            animation: fade-in 1s 0.8s forwards;
        }
        .anniversary-number {
            font-family: var(--font-serif);
            font-size: clamp(5rem, 15vw, 10rem);
            font-weight: 600;
            line-height: 1;
            color: transparent;
            background: linear-gradient(135deg, var(--gold) 0%, #e8d5a3 40%, var(--gold) 60%, #b8923e 100%);
            background-clip: text;
            -webkit-background-clip: text;
            filter: drop-shadow(0 0 40px rgba(197,160,89,0.2));
        }
        .anniversary-sub {
            font-size: clamp(0.8rem, 2vw, 1.1rem);
            font-weight: 700;
            letter-spacing: 0.4em;
            color: var(--gold);
            text-transform: uppercase;
            margin-top: -5px;
        }

        /* Catchcopy */
        .catchcopy {
            font-family: var(--font-serif);
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 600;
            line-height: 1.6;
            letter-spacing: 0.1em;
            margin: 35px 0 50px;
            opacity: 0;
            animation: fade-in 1s 1.1s forwards;
        }

        /* Countdown */
        .countdown-label {
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            margin-bottom: 15px;
            opacity: 0;
            animation: fade-in 1s 1.4s forwards;
        }
        .countdown {
            display: flex;
            justify-content: center;
            gap: clamp(10px, 3vw, 25px);
            margin-bottom: 50px;
            opacity: 0;
            animation: fade-in 1s 1.4s forwards;
        }
        .countdown-item {
            background: var(--dark-card);
            border: 1px solid rgba(197,160,89,0.15);
            border-radius: 8px;
            padding: clamp(12px, 2vw, 20px) clamp(15px, 3vw, 28px);
            min-width: clamp(60px, 10vw, 90px);
            backdrop-filter: blur(10px);
        }
        .countdown-value {
            font-family: var(--font-serif);
            font-size: clamp(1.8rem, 5vw, 3rem);
            font-weight: 600;
            color: var(--gold);
            line-height: 1;
        }
        .countdown-unit {
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            color: rgba(255,255,255,0.4);
            margin-top: 8px;
            text-transform: uppercase;
        }

        /* Event info */
        .event-info {
            border-top: 1px solid rgba(197,160,89,0.15);
            padding-top: 30px;
            opacity: 0;
            animation: fade-in 1s 1.7s forwards;
        }
        .event-date {
            font-family: var(--font-serif);
            font-size: clamp(1rem, 2.5vw, 1.3rem);
            font-weight: 600;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
        }
        .event-venue {
            font-size: clamp(0.8rem, 1.8vw, 0.95rem);
            color: rgba(255,255,255,0.5);
            font-weight: 300;
        }

        /* Coming soon */
        .coming-soon {
            margin-top: 40px;
            font-size: 0.7rem;
            letter-spacing: 0.35em;
            color: rgba(197,160,89,0.4);
            text-transform: uppercase;
            opacity: 0;
            animation: fade-in 1s 2s forwards;
        }

        /* Decorative lines */
        .deco-line {
            width: 40px; height: 1px;
            background: var(--gold);
            margin: 0 auto 30px;
            opacity: 0.3;
            opacity: 0;
            animation: fade-in 1s 1s forwards, line-expand 1.5s 1s forwards;
        }

        @keyframes fade-in {
            to { opacity: 1; }
        }
        @keyframes line-expand {
            from { width: 0; }
            to { width: 40px; opacity: 0.3; }
        }

        /* Corner decorations */
        .corner {
            position: fixed;
            width: 80px; height: 80px;
            z-index: 5;
            opacity: 0;
            animation: fade-in 1.5s 2.5s forwards;
        }
        .corner::before, .corner::after {
            content: '';
            position: absolute;
            background: var(--gold);
            opacity: 0.15;
        }
        .corner-tl { top: 30px; left: 30px; }
        .corner-tl::before { top: 0; left: 0; width: 30px; height: 1px; }
        .corner-tl::after { top: 0; left: 0; width: 1px; height: 30px; }
        .corner-tr { top: 30px; right: 30px; }
        .corner-tr::before { top: 0; right: 0; width: 30px; height: 1px; }
        .corner-tr::after { top: 0; right: 0; width: 1px; height: 30px; }
        .corner-bl { bottom: 30px; left: 30px; }
        .corner-bl::before { bottom: 0; left: 0; width: 30px; height: 1px; }
        .corner-bl::after { bottom: 0; left: 0; width: 1px; height: 30px; }
        .corner-br { bottom: 30px; right: 30px; }
        .corner-br::before { bottom: 0; right: 0; width: 30px; height: 1px; }
        .corner-br::after { bottom: 0; right: 0; width: 1px; height: 30px; }

        @media (max-width: 480px) {
            .corner { display: none; }
            .catchcopy { margin: 25px 0 35px; }
            .event-info { padding-top: 25px; }
            .coming-soon { margin-top: 30px; }
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="bg-grid"></div>
    <div class="particles" id="particles"></div>

    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="container">
        <p class="org-name">名古屋青年税理士連盟</p>

        <div class="anniversary">
            <div class="anniversary-number">60<span style="font-size: 0.4em; vertical-align: super;">th</span></div>
            <div class="anniversary-sub">Anniversary</div>
        </div>

        <div class="deco-line"></div>

        <h1 class="catchcopy">ここから、次の60年。</h1>

        <p class="countdown-label">記念式典まで</p>
        <div class="countdown" id="countdown">
            <div class="countdown-item">
                <div class="countdown-value" id="cd-days">---</div>
                <div class="countdown-unit">Days</div>
            </div>
            <div class="countdown-item">
                <div class="countdown-value" id="cd-hours">--</div>
                <div class="countdown-unit">Hours</div>
            </div>
            <div class="countdown-item">
                <div class="countdown-value" id="cd-mins">--</div>
                <div class="countdown-unit">Min</div>
            </div>
            <div class="countdown-item">
                <div class="countdown-value" id="cd-secs">--</div>
                <div class="countdown-unit">Sec</div>
            </div>
        </div>

        <div class="event-info">
            <p class="event-date">令和9年1月23日（土）15:00〜</p>
            <p class="event-venue">ANAクラウンプラザホテルグランコート名古屋</p>
        </div>

        <p class="coming-soon">Special Site Coming Soon</p>
    </div>

    <script>
        // Countdown Timer — Target: 2027-01-23 15:00 JST
        const target = new Date('2027-01-23T15:00:00+09:00').getTime();

        function updateCountdown() {
            const now = Date.now();
            const diff = target - now;

            if (diff <= 0) {
                document.getElementById('cd-days').textContent = '0';
                document.getElementById('cd-hours').textContent = '0';
                document.getElementById('cd-mins').textContent = '0';
                document.getElementById('cd-secs').textContent = '0';
                return;
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const secs = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('cd-days').textContent = days;
            document.getElementById('cd-hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('cd-mins').textContent = String(mins).padStart(2, '0');
            document.getElementById('cd-secs').textContent = String(secs).padStart(2, '0');
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);

        // Particles
        const container = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = (8 + Math.random() * 12) + 's';
            p.style.animationDelay = Math.random() * 10 + 's';
            p.style.width = p.style.height = (2 + Math.random() * 3) + 'px';
            container.appendChild(p);
        }
    </script>
</body>
</html>
